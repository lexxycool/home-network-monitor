<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home Network Monitor</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            @import url("{{ url_for('static', filename='style.css') }}");
        </style>

        <script>

        
            let autoRefreshTimer = null;
            let scanInProgress = false;

            async function loadDevices() {
                try {
                    const response = await fetch("/api/devices");
                    const devices = await response.json();

                    document.getElementById("deviceCount").innerText = devices.length;

                    let rows = "";

                    if (devices.length === 0) {
                        document.getElementById("deviceBody").innerHTML =
                            "<tr><td colspan='5'>No devices found</td></tr>";
                        return;
                    }

                    devices.forEach(device => {
                        rows += `
                            <tr>
                                <td>${device.host || 'Unknown Device'}</td>
                                <td>${device.ip || '-'}</td>
                                <td>${device.mac || '-'}
                                    <br>
                                    <small class="text-muted">
                                        ${device.vendor || 'Unknown Vendor'}
                                    </small>
                                </td>
                                <td>${device.latency || '-'}</td>
                                <td><span class="status-online">Online</span></td>
                            </tr>
                        `;
                    });

                    document.getElementById("deviceBody").innerHTML = rows;

                } catch (error) {
                    console.error("Refresh failed:", error);
                }
            }


            // function setUpAutoRefresh() {

            //     const rate = parseInt(document.getElementById("autoRefreshRate").value);

            //     if (autoRefreshTimer) {
            //         clearInterval(autoRefreshTimer);
            //         autoRefreshTimer = null;
            //     }

            //     if (rate > 0) {
            //         autoRefreshTimer = setInterval(() => {
            //             loadDevices();
            //         }, rate);
            //     }
            // }


            // window.onload = () => {
            //     setUpAutoRefresh(); 
            // };


            function load_oui() {
                const oui_map = {};
                fetch("oui.txt")
                    .then(response => response.text())
                    .then(text => {
                        const lines = text.split("\n");
                        lines.forEach(line => {
                            if (line.includes("(hex)")) {
                                const parts = line.split("(hex)");
                                let mac_prefix = parts[0].trim().toUpperCase();
                                mac_prefix = mac_prefix.replace("-", ":");
                                const vendor = parts[1].trim();
                                oui_map[mac_prefix] = vendor;
                            }
                        });
                    });
                return oui_map;
            }

        </script>
    </head>

    <body>

        <div class="header">
            <div class="container">

                <div class="d-flex justify-content-between align-items-center">

                    <div>
                        <h2 class="fw-bold mb-1">
                            Home Network Monitor
                        </h2>

                        <p class="text-muted mb-0">
                            Real-Time Device Discovery Dashboard
                        </p>
                    </div>

                    <span class="badge bg-success refresh-badge">
                        Auto Refresh: 60s
                    </span>

                </div>

            </div>

        </div>

        <div class="container">

            <div class="row mb-4 justify-content-between">

                <!-- Devices Online -->
                <div class="col-md-4">
                    <div class="card stat-card h-100">
                        <div class="card-body">

                            <h6 class="text-muted">
                                Devices Online
                            </h6>

                            <h1 id="deviceCount">
                                0
                            </h1>

                        </div>
                    </div>
                </div>

                <!-- Network Scanner -->
                <div class="col-md-4">
                    <div class="card stat-card h-100">
                        <div class="card-body">

                            <h6 class="text-muted">
                                Network Scan
                            </h6>

                            <input
                                type="text"
                                id="networkRange"
                                class="form-control mb-2"
                                value="192.168.1.0/24">

                            <button
                                id="scanBtn"
                                class="btn btn-primary w-100"
                                onclick="loadDevices()">
                                Refresh Data
                            </button>

                        </div>
                    </div>
                </div>
                    

            </div>
            
        </div>

        <div class="device-table">

            <div class="p-3 border-bottom">

                <h5 class="mb-0">
                    Network Devices
                </h5>

            </div>

            <table class="table table-hover mb-0">

                <thead class="table-light">

                <tr>
                    <th>Host</th>
                    <th>IP Address</th>
                    <th>MAC Address</th>
                    <th>Latency</th>
                    <th>Status</th>
                </tr>

                </thead>

                <tbody id="deviceBody">

                </tbody>

            </table>

        </div>

    </body>
</html>
