<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Network Monitor</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    @import url("{{ url_for('static', filename='style.css') }}");
</style>


<script>
    async function loadData() {

        const response = await fetch('/scan');
        const devices = await response.json();

        document.getElementById("deviceCount").innerText = devices.length;

        let rows = "";

        devices.forEach(device => {

            rows += `
            <tr>
                <td>${device.host || 'Unknown Device'}</td>
                <td>${device.ip || '-'}</td>
                <td>${device.mac || '-'}</td>
                <td>${device.latency || '-'}</td>
                <td>
                    <span class="status-online">
                        Online
                    </span>
                </td>
            </tr>
            `;
        });

        document.getElementById("deviceBody").innerHTML = rows;
    }

    window.onload = () => {
        loadData();
        setInterval(loadData, 10000);
    };
</script>

</head>

<body>

<div class="header">
    <div class="container">

    <div class="d-flex justify-content-between align-items-center">

        <div>
            <h2 class="fw-bold mb-1">
                Home Network Monitor
            </h2>

            <p class="text-muted mb-0">
                Real-Time Device Discovery Dashboard
            </p>
        </div>

        <span class="badge bg-success refresh-badge">
            Auto Refresh: 10s
        </span>

    </div>

</div>

</div>

<div class="container">

<div class="row mb-4">

    <div class="col-md-4">

        <div class="card stat-card">

            <div class="card-body">

                <h6 class="text-muted">
                    Devices Online
                </h6>

                <h1 id="deviceCount">
                    0
                </h1>

            </div>

        </div>

    </div>

</div>

<div class="device-table">

    <div class="p-3 border-bottom">

        <h5 class="mb-0">
            Network Devices
        </h5>

    </div>

    <table class="table table-hover mb-0">

        <thead class="table-light">

        <tr>
            <th>Host</th>
            <th>IP Address</th>
            <th>MAC Address</th>
            <th>Latency</th>
            <th>Status</th>
        </tr>

        </thead>

        <tbody id="deviceBody">

        </tbody>

    </table>

</div>

</div>

</body>
</html>
